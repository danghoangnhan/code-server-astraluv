stages:
  - build
  - docs

variables:
  HARBOR_REGISTRY: harbor.thinktron.co
  HARBOR_PROJECT: sec1
  IMAGE_NAME: code-server-astral-uv
  CUDA_FLAVOR: base

.kaniko-auth: &kaniko-auth
  - mkdir -p /kaniko/.docker
  - |
    cat > /kaniko/.docker/config.json <<EOF
    {"auths":{"${HARBOR_REGISTRY}":{"auth":"$(printf '%s:%s' "${HARBOR_USERNAME}" "${HARBOR_PASSWORD}" | base64 | tr -d '\n')"}}}
    EOF

.build-template:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  tags:
    - k3s
  before_script:
    - *kaniko-auth
  script:
    - CUDA_SHORT="cuda${CUDA_VERSION%.*}"
    - IMAGE_BASE="${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${IMAGE_NAME}"
    - VARIANT_TAG="${TAG_PREFIX}-${CUDA_SHORT}-ubuntu${UBUNTU_VERSION}-${CUDA_FLAVOR}"
    - |
      /kaniko/executor \
        --context "${CI_PROJECT_DIR}" \
        --dockerfile "${CI_PROJECT_DIR}/Dockerfile" \
        --destination "${IMAGE_BASE}:${VARIANT_TAG}" \
        $EXTRA_DESTINATIONS \
        --build-arg "CUDA_VERSION=${CUDA_VERSION}" \
        --build-arg "CUDA_FLAVOR=${CUDA_FLAVOR}" \
        --build-arg "UBUNTU_VERSION=${UBUNTU_VERSION}" \
        --cache=true \
        --cache-repo "${IMAGE_BASE}/cache" \
        --snapshot-mode=redo

build-main:
  extends: .build-template
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - Dockerfile
        - s6/**/*
        - config/**/*
        - scripts/build.sh
  variables:
    TAG_PREFIX: "latest"
    EXTRA_DESTINATIONS: "--destination ${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${IMAGE_NAME}:latest"
  parallel:
    matrix:
      - CUDA_VERSION: ["11.8.0", "12.1.1", "12.2.2", "12.4.1", "12.6.3", "12.8.1"]
        UBUNTU_VERSION: "22.04"
      - CUDA_VERSION: ["12.6.3", "12.8.1"]
        UBUNTU_VERSION: "24.04"

build-release:
  extends: .build-template
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  variables:
    TAG_PREFIX: "${CI_COMMIT_TAG}"
  parallel:
    matrix:
      - CUDA_VERSION: ["11.8.0", "12.1.1", "12.2.2", "12.4.1", "12.6.3", "12.8.1"]
        UBUNTU_VERSION: "22.04"
        CUDA_FLAVOR: ["base", "runtime", "devel"]
      - CUDA_VERSION: ["12.6.3", "12.8.1"]
        UBUNTU_VERSION: "24.04"
        CUDA_FLAVOR: ["base", "runtime", "devel"]

trivy-scan:
  stage: build
  image:
    name: aquasec/trivy:0.52.2
    entrypoint: [""]
  tags:
    - k3s
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - Dockerfile
  needs:
    - job: build-main
      parallel:
        matrix:
          - CUDA_VERSION: "12.8.1"
            UBUNTU_VERSION: "22.04"
  variables:
    TRIVY_CACHE_DIR: .trivycache/
  script:
    - trivy image
      --severity CRITICAL,HIGH
      --ignore-unfixed
      --no-progress
      --exit-code 0
      "${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${IMAGE_NAME}:latest-cuda12.8-ubuntu22.04-base"
  cache:
    paths:
      - .trivycache/

sync-wiki:
  stage: docs
  image: alpine/git:2.45.2
  tags:
    - k3s
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - wiki/**/*
  variables:
    GIT_STRATEGY: clone
  before_script:
    - apk add --no-cache rsync
    - git config --global user.email "ci@${CI_SERVER_HOST}"
    - git config --global user.name  "GitLab CI (wiki sync)"
  script:
    - WIKI_URL="https://wiki-bot:${WIKI_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.wiki.git"
    - git clone "$WIKI_URL" wiki-repo
    - rsync -a --delete --exclude='.git' wiki/ wiki-repo/
    - cd wiki-repo
    - git add -A
    - if git diff --cached --quiet; then echo "No wiki changes"; exit 0; fi
    - git commit -m "Sync wiki from ${CI_COMMIT_SHORT_SHA}"
    - git push origin HEAD:master
