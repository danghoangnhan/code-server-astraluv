name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY_IMAGE: ${{ secrets.DOCKER_USERNAME }}/code-server-astraluv

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        cuda_flavor: [base, runtime, devel]
        include_group:
          # Ubuntu 22.04 combos
          - cuda_version: "11.8.0"
            ubuntu_version: "22.04"
          - cuda_version: "12.1.1"
            ubuntu_version: "22.04"
          - cuda_version: "12.2.2"
            ubuntu_version: "22.04"
          - cuda_version: "12.4.1"
            ubuntu_version: "22.04"
          - cuda_version: "12.6.3"
            ubuntu_version: "22.04"
          - cuda_version: "12.8.1"
            ubuntu_version: "22.04"
          # Ubuntu 24.04 combos (CUDA 12.5+)
          - cuda_version: "12.6.3"
            ubuntu_version: "24.04"
          - cuda_version: "12.8.1"
            ubuntu_version: "24.04"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Derive CUDA short tag
        id: cuda
        run: |
          FULL="${{ matrix.include_group.cuda_version }}"
          SHORT="${FULL%.*}"
          echo "short=cuda${SHORT}" >> $GITHUB_OUTPUT
          echo "version=${FULL}" >> $GITHUB_OUTPUT
          echo "ubuntu=${{ matrix.include_group.ubuntu_version }}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=ref,event=tag,suffix=-${{ steps.cuda.outputs.short }}-ubuntu${{ steps.cuda.outputs.ubuntu }}-${{ matrix.cuda_flavor }}
            type=semver,pattern={{version}},suffix=-${{ steps.cuda.outputs.short }}-ubuntu${{ steps.cuda.outputs.ubuntu }}-${{ matrix.cuda_flavor }}
            type=semver,pattern={{major}}.{{minor}},suffix=-${{ steps.cuda.outputs.short }}-ubuntu${{ steps.cuda.outputs.ubuntu }}-${{ matrix.cuda_flavor }}
            type=raw,value=latest-${{ steps.cuda.outputs.short }}-ubuntu${{ steps.cuda.outputs.ubuntu }}-${{ matrix.cuda_flavor }},enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ matrix.include_group.cuda_version == '12.8.1' && matrix.include_group.ubuntu_version == '22.04' && matrix.cuda_flavor == 'base' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CUDA_VERSION=${{ steps.cuda.outputs.version }}
            CUDA_FLAVOR=${{ matrix.cuda_flavor }}
            UBUNTU_VERSION=${{ steps.cuda.outputs.ubuntu }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  scan:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (default variant)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/code-server-astraluv:latest-cuda12.8-ubuntu22.04-base
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Trivy in table format
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/code-server-astraluv:latest-cuda12.8-ubuntu22.04-base
          format: 'table'
          output: 'trivy-results.txt'

      - name: Comment on workflow run
        if: always()
        run: |
          echo "## Trivy Scan Results (default variant: cuda12.8-ubuntu22.04-base)" >> $GITHUB_STEP_SUMMARY
          cat trivy-results.txt >> $GITHUB_STEP_SUMMARY
