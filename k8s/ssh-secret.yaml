# =============================================================================
# SSH Public Key Secret
# =============================================================================
# Replace <YOUR_SSH_PUBLIC_KEY> with your actual public key content.
#
# Generate a key pair if you don't have one:
#   ssh-keygen -t ed25519 -C "kubeflow-notebook" -f ~/.ssh/kubeflow_ed25519
#
# Then base64-encode or paste the public key below:
#   cat ~/.ssh/kubeflow_ed25519.pub
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: notebook-ssh-key
  namespace: kubeflow-user
  labels:
    app: kubeflow-notebook
type: Opaque
stringData:
  jovyan: |
    # Paste your SSH public key(s) here, one per line:
    ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAA... your-email@example.com
