# Spawner UI Config Patch for Kubeflow Jupyter Web App (JWA)
#
# This adds SSH-enabled images to the "New Notebook" image dropdown
# in the Kubeflow Dashboard.
#
# Usage (patch existing ConfigMap):
#   kubectl patch configmap jupyter-web-app-config -n kubeflow \
#     --patch-file kubeflow/dashboard/spawner-config-patch.yaml
#
# Or merge into your existing spawner_ui_config.yaml manually.
#
# Compatible with Kubeflow 1.7+ (string list format).
# For Kubeflow 1.8+ object format, see comments below.

apiVersion: v1
kind: ConfigMap
metadata:
  name: jupyter-web-app-config
  namespace: kubeflow
data:
  spawner_ui_config.yaml: |
    spawnerFormDefaults:
      image:
        value: harbor.thinktron.co/sec1/code-server-astral-uv:latest
        options:
          # --- Kubeflow 1.7 format (plain strings) ---
          - harbor.thinktron.co/sec1/code-server-astral-uv:latest
          # CUDA 12.8
          - harbor.thinktron.co/sec1/code-server-astral-uv:latest-cuda12.8-ubuntu22.04-base
          - harbor.thinktron.co/sec1/code-server-astral-uv:latest-cuda12.8-ubuntu22.04-runtime
          - harbor.thinktron.co/sec1/code-server-astral-uv:latest-cuda12.8-ubuntu22.04-devel
          # CUDA 12.4
          - harbor.thinktron.co/sec1/code-server-astral-uv:latest-cuda12.4-ubuntu22.04-runtime
          - harbor.thinktron.co/sec1/code-server-astral-uv:latest-cuda12.4-ubuntu22.04-devel
          # CUDA 11.8
          - harbor.thinktron.co/sec1/code-server-astral-uv:latest-cuda11.8-ubuntu22.04-runtime
          - harbor.thinktron.co/sec1/code-server-astral-uv:latest-cuda11.8-ubuntu22.04-devel

          # --- Kubeflow 1.8+ format (uncomment to use object format with labels) ---
          # - value: harbor.thinktron.co/sec1/code-server-astral-uv:latest
          #   label: "SSH + UV (latest)"
          # - value: harbor.thinktron.co/sec1/code-server-astral-uv:latest-cuda12.8-ubuntu22.04-runtime
          #   label: "SSH + UV + CUDA 12.8 Runtime"
          # - value: harbor.thinktron.co/sec1/code-server-astral-uv:latest-cuda12.8-ubuntu22.04-devel
          #   label: "SSH + UV + CUDA 12.8 Devel"
          # - value: harbor.thinktron.co/sec1/code-server-astral-uv:latest-cuda12.4-ubuntu22.04-runtime
          #   label: "SSH + UV + CUDA 12.4 Runtime"
          # - value: harbor.thinktron.co/sec1/code-server-astral-uv:latest-cuda11.8-ubuntu22.04-runtime
          #   label: "SSH + UV + CUDA 11.8 Runtime"

      imagePullPolicy:
        value: Always

      configurations:
        value: []
