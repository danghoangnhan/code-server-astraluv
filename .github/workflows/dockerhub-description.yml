name: Update Docker Hub Description

on:
  push:
    branches: [ "main" ]
    paths:
      - 'wiki/Docker-Hub.md'
  workflow_dispatch:

jobs:
  update-description:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          repository: ${{ secrets.DOCKER_USERNAME }}/code-server-astraluv
          readme-filepath: ./wiki/Docker-Hub.md
          short-description: "Minimal GPU Kubeflow notebook: VS Code Server + SSH + CUDA 11.8-12.8 + Astral UV"
