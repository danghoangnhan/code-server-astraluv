# =============================================================================
# SSH Service — primary access method for VS Code Remote SSH
# =============================================================================
# Exposes SSH (port 22) via LoadBalancer for external access.
# Users connect from outside the cluster using VS Code Remote-SSH.
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: pytorch-ssh-notebook-ssh
  namespace: kubeflow-user
  labels:
    app: kubeflow-notebook
    notebook-name: pytorch-ssh-notebook
spec:
  selector:
    notebook-name: pytorch-ssh-notebook
    statefulset: pytorch-ssh-notebook
  ports:
    - name: ssh
      port: 22
      targetPort: 22
      protocol: TCP
  type: LoadBalancer
  # -----------------------------------------------------------------------
  # Alternative access methods:
  #   type: NodePort        # allocates a random high port on every node
  #   type: ClusterIP       # internal only, use with kubectl port-forward
  #
  # Port-forward fallback:
  #   kubectl port-forward svc/pytorch-ssh-notebook-ssh 2222:22
  # -----------------------------------------------------------------------
