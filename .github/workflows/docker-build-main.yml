name: Docker Image CI - Main Branch

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY_IMAGE: ${{ secrets.DOCKER_USERNAME }}/code-server-astraluv

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include_group:
          # Ubuntu 22.04 combos
          - cuda_version: "11.8.0"
            ubuntu_version: "22.04"
          - cuda_version: "12.1.1"
            ubuntu_version: "22.04"
          - cuda_version: "12.2.2"
            ubuntu_version: "22.04"
          - cuda_version: "12.4.1"
            ubuntu_version: "22.04"
          - cuda_version: "12.6.3"
            ubuntu_version: "22.04"
          - cuda_version: "12.8.1"
            ubuntu_version: "22.04"
          # Ubuntu 24.04 combos (CUDA 12.5+)
          - cuda_version: "12.6.3"
            ubuntu_version: "24.04"
          - cuda_version: "12.8.1"
            ubuntu_version: "24.04"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive image metadata
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date -u +'%Y%m%d')
          VERSION="${DATE}-${SHORT_SHA}"

          FULL="${{ matrix.include_group.cuda_version }}"
          CUDA_SHORT="cuda${FULL%.*}"
          UBUNTU="${{ matrix.include_group.ubuntu_version }}"

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "cuda_short=${CUDA_SHORT}" >> $GITHUB_OUTPUT
          echo "cuda_version=${FULL}" >> $GITHUB_OUTPUT
          echo "ubuntu=${UBUNTU}" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub (on push to main)
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image (base variant)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.REGISTRY_IMAGE }}:${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.cuda_short }}-ubuntu${{ steps.meta.outputs.ubuntu }}-base
            ${{ env.REGISTRY_IMAGE }}:${{ steps.meta.outputs.short_sha }}-${{ steps.meta.outputs.cuda_short }}-ubuntu${{ steps.meta.outputs.ubuntu }}-base
            ${{ env.REGISTRY_IMAGE }}:latest-${{ steps.meta.outputs.cuda_short }}-ubuntu${{ steps.meta.outputs.ubuntu }}-base
          build-args: |
            CUDA_VERSION=${{ steps.meta.outputs.cuda_version }}
            CUDA_FLAVOR=base
            UBUNTU_VERSION=${{ steps.meta.outputs.ubuntu }}
          labels: |
            org.opencontainers.image.title=code-server-astraluv
            org.opencontainers.image.description=GPU-enabled Kubeflow notebook with UV and SSH access
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          cache-from: type=gha
          cache-to: type=gha,mode=max

  scan:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate image metadata
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Run Trivy vulnerability scanner (default variant)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY_IMAGE }}:${{ steps.meta.outputs.short_sha }}-cuda12.8-ubuntu22.04-base
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Trivy in table format
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY_IMAGE }}:${{ steps.meta.outputs.short_sha }}-cuda12.8-ubuntu22.04-base
          format: 'table'
          output: 'trivy-results.txt'

      - name: Post scan results to workflow summary
        if: always()
        run: |
          echo "## Trivy Vulnerability Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat trivy-results.txt >> $GITHUB_STEP_SUMMARY
