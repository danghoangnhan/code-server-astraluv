apiVersion: kubeflow.org/v1
kind: Notebook
metadata:
  name: kubeflow-notebook-uv-ssh
  namespace: kubeflow-user
  labels:
    app: kubeflow-notebook-uv
  annotations:
    notebooks.kubeflow.org/ssh-enabled: "true"
spec:
  template:
    spec:
      serviceAccountName: default-editor
      containers:
      - name: notebook
        image: danieldu28121999/code-server-astraluv:latest
        imagePullPolicy: Always
        resources:
          requests:
            memory: "4Gi"
            cpu: "2"
          limits:
            memory: "8Gi"
            cpu: "4"
        ports:
        - containerPort: 22
          name: ssh
          protocol: TCP
        volumeMounts:
        - name: workspace
          mountPath: /home/jovyan
        - name: ssh-keys
          mountPath: /etc/ssh/authorized_keys
          readOnly: true
      volumes:
      - name: workspace
        persistentVolumeClaim:
          claimName: workspace-kubeflow-notebook-uv-ssh
      - name: ssh-keys
        secret:
          secretName: notebook-ssh-key
          defaultMode: 0644
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: workspace-kubeflow-notebook-uv-ssh
  namespace: kubeflow-user
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: standard
